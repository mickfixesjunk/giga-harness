name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  build-and-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build (release profile — same path the release workflow uses)
        run: cargo build --release

      - name: Test (release profile)
        run: cargo test --release

      - name: Format check
        # Soft check — warn-only. Style nits aren't release-blockers.
        # `shell: bash` is required so `||` short-circuits the same way
        # on Windows runners (default shell there is pwsh, where `||`
        # has different semantics in older versions).
        shell: bash
        run: cargo fmt --check || echo "::warning::rustfmt would reformat — run \`cargo fmt\` to apply"
