<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>giga ui</title>
<style>
:root {
  --bg: #fafafa; --panel: #ffffff; --border: #e5e5e5; --muted: #6b6b6b;
  --text: #1a1a1a; --accent: #1a4ed4; --ok: #16a34a; --bad: #dc2626; --warn: #ca8a04;
  --code-bg: #f3f3f3;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f0f10; --panel: #181819; --border: #2a2a2c; --muted: #9a9a9a;
    --text: #e5e5e5; --accent: #6ea1ff; --ok: #4ade80; --bad: #f87171; --warn: #fbbf24;
    --code-bg: #1f1f21;
  }
}
* { box-sizing: border-box; }
body {
  margin: 0; font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg); color: var(--text); height: 100vh;
  display: grid; grid-template-rows: auto 1fr; font-size: 14px;
}
header {
  padding: .6rem 1rem; background: var(--panel); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 1rem;
}
header h1 { font-size: 1.05rem; margin: 0; font-weight: 600; }
header .sub { color: var(--muted); font-size: .85rem; }
header .right { margin-left: auto; display: flex; gap: 1rem; align-items: center; font-size: .85rem; color: var(--muted); }
main { display: grid; grid-template-columns: 280px 1fr; min-height: 0; }
nav {
  background: var(--panel); border-right: 1px solid var(--border);
  overflow-y: auto; padding: 0 0 .5rem 0;
  display: flex; flex-direction: column;
}
#nav-brand {
  display: block; padding: .3rem .35rem .25rem; text-align: center;
  border-bottom: 1px solid var(--border); margin-bottom: .25rem;
}
#nav-brand img {
  display: block; width: 100%; max-width: 260px; height: auto;
  margin: 0 auto; border-radius: 6px;
}
nav h2 {
  font-size: .7rem; text-transform: uppercase; letter-spacing: .08em;
  color: var(--muted); padding: .75rem 1rem .25rem; margin: 0;
}
nav ul { list-style: none; padding: 0; margin: 0; }
nav li a {
  display: flex; align-items: center; gap: .5rem;
  padding: .4rem 1rem; color: var(--text); text-decoration: none;
  cursor: pointer; font-size: .9rem;
}
nav li a:hover { background: var(--code-bg); }
nav li a.active { background: var(--accent); color: white; }
nav li a.active .meta { color: rgba(255,255,255,.85); }
nav li a .meta { color: var(--muted); font-size: .75rem; margin-left: auto; }
nav .status-dot {
  width: .55rem; height: .55rem; border-radius: 50%;
  background: var(--muted); flex-shrink: 0;
}
nav .status-dot.ok { background: var(--ok); }
nav .status-dot.partial { background: var(--warn); }
nav .status-dot.bad { background: var(--bad); }
section {
  padding: 1rem 1.25rem; overflow-y: auto; display: flex; flex-direction: column; min-height: 0;
}
section h2 { margin: 0 0 .5rem 0; font-size: 1.1rem; }
section .desc { color: var(--muted); margin: 0 0 1rem 0; font-size: .9rem; }
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: .75rem; }
.card {
  background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
  padding: .85rem; text-decoration: none; color: var(--text); display: block;
}
.card:hover { border-color: var(--accent); }
.card h3 { margin: 0 0 .25rem 0; font-size: 1rem; }
.card .stat { color: var(--muted); font-size: .85rem; }
.card .last { color: var(--muted); font-size: .75rem; margin-top: .35rem; }
.section-tabs { display: flex; gap: 1rem; margin-bottom: .75rem; border-bottom: 1px solid var(--border); }
.section-tabs a {
  padding: .4rem 0; color: var(--muted); text-decoration: none;
  border-bottom: 2px solid transparent; font-size: .85rem; cursor: pointer;
}
.section-tabs a.active { color: var(--text); border-bottom-color: var(--accent); }
.agent-row, .channel-row {
  display: flex; align-items: center; gap: .5rem;
  padding: .35rem .5rem; border-radius: 4px; cursor: pointer;
  border: 1px solid transparent;
}
.agent-row:hover, .channel-row:hover { background: var(--code-bg); }
.agent-row .name, .channel-row .name { flex: 1; font-weight: 500; }
.agent-row .meta, .channel-row .meta { color: var(--muted); font-size: .75rem; }
.posts { display: flex; flex-direction: column; gap: .8rem; min-height: 0; flex: 1; overflow-y: auto; padding-right: .5rem; }
.post {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 6px; padding: .65rem .85rem;
}
.post-head {
  display: flex; align-items: baseline; gap: .5rem;
  font-size: .85rem; margin-bottom: .3rem;
}
.post-head .sender { font-weight: 600; color: var(--accent); }
.post-head .ts { color: var(--muted); font-size: .75rem; margin-left: auto; }
.post-head .subject { color: var(--text); }
.post-body { white-space: pre-wrap; font-family: ui-monospace, 'Menlo', monospace; font-size: .82rem; line-height: 1.4; color: var(--text); }
.empty { color: var(--muted); padding: 2rem; text-align: center; font-style: italic; }
.error { background: #dc2626; color: white; padding: .5rem 1rem; border-radius: 4px; font-size: .85rem; margin-bottom: 1rem; }
.ws-state { font-size: .75rem; color: var(--muted); }
.ws-state.live::before { content: "● "; color: var(--ok); }
.ws-state.connecting::before { content: "● "; color: var(--warn); }
.ws-state.disconnected::before { content: "● "; color: var(--bad); }
button {
  background: var(--accent); color: white; border: 0;
  padding: .35rem .75rem; border-radius: 4px; cursor: pointer; font-size: .8rem;
}
button:hover { opacity: .9; }
button:disabled { opacity: .5; cursor: not-allowed; }
code { background: var(--code-bg); padding: 0 .25rem; border-radius: 3px; font-size: .85em; }
.composer {
  background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
  padding: .65rem; margin-top: .75rem;
  display: grid; grid-template-columns: auto 1fr; gap: .4rem .6rem; align-items: center;
}
.composer .row {
  display: contents;
}
.composer label {
  font-size: .75rem; text-transform: uppercase; letter-spacing: .05em;
  color: var(--muted);
}
.composer input, .composer textarea, .composer select {
  background: var(--bg); color: var(--text); border: 1px solid var(--border);
  border-radius: 4px; padding: .3rem .45rem; font: inherit; font-size: .85rem;
  width: 100%;
}
.composer textarea {
  font-family: ui-monospace, 'Menlo', monospace; font-size: .8rem;
  min-height: 4rem; resize: vertical;
}
.composer .actions {
  grid-column: 1 / -1; display: flex; gap: .5rem; align-items: center;
  margin-top: .25rem;
}
.composer .actions .feedback { font-size: .8rem; color: var(--muted); }
.composer .actions .feedback.ok { color: var(--ok); }
.composer .actions .feedback.err { color: var(--bad); }
.toolbar { display: flex; gap: .5rem; margin: .5rem 0; }
.toolbar button { background: transparent; color: var(--text); border: 1px solid var(--border); }
.toolbar button:hover { border-color: var(--accent); color: var(--accent); }
.exec-output {
  background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
  padding: .65rem .85rem; margin-top: .5rem;
  font-family: ui-monospace, 'Menlo', monospace; font-size: .8rem;
  white-space: pre-wrap; max-height: 14rem; overflow-y: auto;
}
.exec-output.ok { border-left: 3px solid var(--ok); }
.exec-output.err { border-left: 3px solid var(--bad); }
.exec-output .label { color: var(--muted); font-size: .7rem; text-transform: uppercase; letter-spacing: .05em; margin-top: .25rem; }
.form-panel {
  background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
  padding: .75rem; margin: .75rem 0;
  display: grid; grid-template-columns: 8rem 1fr; gap: .4rem .6rem; align-items: center;
}
.form-panel .row { display: contents; }
.form-panel label { font-size: .8rem; color: var(--muted); }
.form-panel input, .form-panel textarea, .form-panel select {
  background: var(--bg); color: var(--text); border: 1px solid var(--border);
  border-radius: 4px; padding: .3rem .45rem; font: inherit; font-size: .85rem; width: 100%;
}
.form-panel .checkbox-row { grid-column: 2; display: flex; gap: 1rem; align-items: center; font-size: .85rem; }
.form-panel .checkbox-row label { color: var(--text); }
.form-panel .actions { grid-column: 1 / -1; display: flex; gap: .5rem; align-items: center; margin-top: .25rem; }
.form-panel .hint { grid-column: 2; font-size: .75rem; color: var(--muted); }
</style>
</head>
<body>
<header>
  <a href="#/" style="text-decoration:none;color:inherit">
    <h1>giga ui</h1>
  </a>
  <span class="sub">v__VERSION__ · dashboard</span>
  <div class="right">
    <span id="proc-summary"></span>
    <a href="/api/health" target="_blank" style="color: var(--muted)">API</a>
  </div>
</header>
<main>
  <nav>
    <a id="nav-brand" href="#/" title="back to all swarms">
      <img src="/assets/giga-icon.png" alt="giga">
    </a>
    <div id="nav"></div>
  </nav>
  <section id="content"></section>
</main>

<script>
"use strict";

const $ = (id) => document.getElementById(id);
const el = (tag, attrs = {}, ...children) => {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === "className") e.className = v;
    else if (k === "onClick") e.addEventListener("click", v);
    else if (k === "html") e.innerHTML = v;
    else if (v !== null && v !== undefined) e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === "string") e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
};

const fmtRel = (iso) => {
  if (!iso) return "";
  const t = new Date(iso).getTime();
  if (isNaN(t)) return "";
  const sec = Math.max(0, Math.floor((Date.now() - t) / 1000));
  if (sec < 60) return `${sec}s ago`;
  if (sec < 3600) return `${Math.floor(sec / 60)}m ago`;
  if (sec < 86400) return `${Math.floor(sec / 3600)}h ago`;
  return `${Math.floor(sec / 86400)}d ago`;
};

// ---------- routing ----------
// #/                                       — home (swarms grid)
// #/swarm/<name>                           — swarm view: timeline
// #/swarm/<name>/agent/<slug>              — agent detail view
// #/swarm/<name>/channel/<file>            — channel tail (live WS)

const parseHash = () => {
  const h = location.hash.replace(/^#\/?/, "");
  if (!h) return { view: "home" };
  const parts = h.split("/").filter(Boolean);
  if (parts[0] === "swarm" && parts.length >= 2) {
    const swarm = decodeURIComponent(parts[1]);
    if (parts.length >= 4 && parts[2] === "channel") {
      return { view: "channel", swarm, channel: decodeURIComponent(parts[3]) };
    }
    if (parts.length >= 4 && parts[2] === "agent") {
      return { view: "agent", swarm, agent: decodeURIComponent(parts[3]) };
    }
    return { view: "swarm", swarm };
  }
  return { view: "home" };
};

const navTo = (route) => {
  if (route.view === "home") location.hash = "#/";
  else if (route.view === "swarm") location.hash = `#/swarm/${encodeURIComponent(route.swarm)}`;
  else if (route.view === "channel") location.hash = `#/swarm/${encodeURIComponent(route.swarm)}/channel/${encodeURIComponent(route.channel)}`;
  else if (route.view === "agent") location.hash = `#/swarm/${encodeURIComponent(route.swarm)}/agent/${encodeURIComponent(route.agent)}`;
};

// ---------- data layer ----------

const api = async (path) => {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return await r.json();
};

let activeWs = null;
const closeWs = () => {
  if (activeWs) { try { activeWs.close(); } catch {} activeWs = null; }
};

// ---------- views ----------

const renderHome = async () => {
  closeWs();
  stopSwarmRefresh();
  $("nav").innerHTML = "";
  $("nav").appendChild(el("h2", {}, "Swarms"));
  $("content").innerHTML = "<div class='empty'>Loading…</div>";

  let swarms;
  try { swarms = await api("/api/swarms"); }
  catch (e) {
    $("content").innerHTML = "";
    $("content").appendChild(el("div", { className: "error" }, `Failed to load swarms: ${e.message}`));
    return;
  }

  // v0.6.49 (fix in v0.6.50): filter archived swarms out of BOTH
  // the sidebar and the main grid. Previously the sidebar showed
  // them anyway.
  const showArchived = localStorage.getItem("show-archived") === "1";
  const visible = swarms.filter((s) => !s.archived || showArchived);
  const archivedCount = swarms.filter((s) => s.archived).length;

  const navList = el("ul");
  for (const s of visible) {
    navList.appendChild(el("li", {}, el("a", {
      onClick: () => navTo({ view: "swarm", swarm: s.name }),
      style: s.archived ? "opacity:.55" : "",
    }, el("span", { className: "status-dot " + (s.load_error ? "bad" : "ok") }), s.name)));
  }
  $("nav").appendChild(navList);

  const content = $("content");
  content.innerHTML = "";

  const titleRow = el("div", { style: "display:flex;align-items:center;gap:.75rem" });
  titleRow.appendChild(el("h2", { style: "margin:0" }, "All swarms"));
  if (archivedCount > 0) {
    const lbl = el("label", { style: "font-size:.8rem;color:var(--muted);display:flex;align-items:center;gap:.25rem;cursor:pointer" });
    const cb = el("input", { type: "checkbox" });
    cb.checked = showArchived;
    cb.addEventListener("change", () => {
      localStorage.setItem("show-archived", cb.checked ? "1" : "0");
      renderHome();
    });
    lbl.appendChild(cb);
    lbl.appendChild(document.createTextNode(` show archived (${archivedCount})`));
    titleRow.appendChild(lbl);
  }
  content.appendChild(titleRow);
  content.appendChild(el("p", { className: "desc" }, `${visible.length} active${archivedCount > 0 ? `, ${archivedCount} archived` : ""}.`));

  // Toolbar with machine-level actions (Phase v2-2: upgrade).
  const toolbar = el("div", { className: "toolbar" });
  const upgradeBtn = el("button", {}, "giga upgrade --bare");
  const dryRunBtn = el("button", {}, "preview upgrade (--dry-run)");
  const output = el("div", { style: "display:none" });
  const triggerUpgrade = async (dryRun) => {
    upgradeBtn.disabled = dryRunBtn.disabled = true;
    output.style.display = "block";
    output.className = "exec-output";
    output.textContent = "running giga upgrade" + (dryRun ? " --dry-run" : "") + "…";
    try {
      const r = await fetch(`/api/upgrade?dry_run=${dryRun ? "true" : "false"}`, { method: "POST" });
      const j = await r.json();
      output.className = "exec-output " + (j.ok ? "ok" : "err");
      output.textContent = "";
      if (j.stdout) {
        output.appendChild(el("div", { className: "label" }, "stdout"));
        output.appendChild(document.createTextNode(j.stdout));
      }
      if (j.stderr) {
        output.appendChild(el("div", { className: "label" }, "stderr"));
        output.appendChild(document.createTextNode(j.stderr));
      }
      output.appendChild(el("div", { className: "label" }, "exit code: " + j.exit_code));
    } catch (e) {
      output.className = "exec-output err";
      output.textContent = e.message;
    } finally {
      upgradeBtn.disabled = dryRunBtn.disabled = false;
    }
  };
  upgradeBtn.addEventListener("click", () => {
    if (!confirm("Run giga upgrade --bare now? This downloads and installs the latest release.")) return;
    triggerUpgrade(false);
  });
  dryRunBtn.addEventListener("click", () => triggerUpgrade(true));
  toolbar.appendChild(upgradeBtn);
  toolbar.appendChild(dryRunBtn);
  content.appendChild(toolbar);
  content.appendChild(output);

  if (visible.length === 0) {
    if (swarms.length === 0) {
      content.appendChild(el("div", { className: "empty" },
        "No swarms registered. Run ",
        el("code", {}, "giga setup"),
        " to create one."));
    } else {
      content.appendChild(el("div", { className: "empty" },
        "All swarms are archived. Toggle \"show archived\" above to bring them back."));
    }
    return;
  }

  const grid = el("div", { className: "card-grid" });
  for (const s of visible) {
    const cardInner = el("div", { style: "position:relative" });
    const card = el("a", {
      className: "card",
      onClick: () => navTo({ view: "swarm", swarm: s.name }),
      style: s.archived ? "opacity:.55" : "",
    },
      el("h3", {}, s.name, s.archived ? el("span", { style: "color:var(--muted);font-size:.7rem;font-weight:normal;margin-left:.4rem" }, "archived") : null),
      s.load_error
        ? el("div", { className: "stat", style: "color:var(--bad)" }, `config error: ${s.load_error.slice(0, 80)}…`)
        : el("div", { className: "stat" }, `${s.agent_count} agents · ${s.channel_count} channels`),
      s.last_activity_iso
        ? el("div", { className: "last" }, `last activity ${fmtRel(s.last_activity_iso)}`)
        : el("div", { className: "last" }, "no activity yet")
    );
    const archiveBtn = el("button", {
      style: "position:absolute;top:.4rem;right:.4rem;background:transparent;color:var(--muted);border:1px solid var(--border);padding:.1rem .4rem;font-size:.65rem",
      title: s.archived ? "Bring this swarm back into the active list" : "Hide this swarm from the default list (reversible — toggle 'show archived' to find it again)",
    }, s.archived ? "unarchive" : "archive");
    archiveBtn.addEventListener("click", async (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      archiveBtn.disabled = true;
      try {
        const r = await fetch(`/api/swarms/${encodeURIComponent(s.name)}/archive`, {
          method: "POST", headers: { "content-type": "application/json" },
          body: JSON.stringify({ archived: !s.archived }),
        });
        if (r.ok) renderHome();
      } finally {
        archiveBtn.disabled = false;
      }
    });
    cardInner.appendChild(card);
    cardInner.appendChild(archiveBtn);
    grid.appendChild(cardInner);
  }
  content.appendChild(grid);
};

let currentSwarmDetail = null;
let swarmRefreshTimer = null;

const stopSwarmRefresh = () => {
  if (swarmRefreshTimer) { clearInterval(swarmRefreshTimer); swarmRefreshTimer = null; }
};

const renderSwarm = async (swarm, focusChannel, focusAgent) => {
  closeWs();
  stopSwarmRefresh();
  $("content").innerHTML = "<div class='empty'>Loading…</div>";
  $("nav").innerHTML = "";

  let detail;
  try { detail = await api(`/api/swarms/${encodeURIComponent(swarm)}`); }
  catch (e) {
    $("content").innerHTML = "";
    $("content").appendChild(el("div", { className: "error" }, `Failed to load ${swarm}: ${e.message}`));
    return;
  }
  currentSwarmDetail = detail;

  // Build sidebar: home link + agents + channels.
  const nav = $("nav");
  nav.appendChild(el("h2", {}, el("a", { onClick: () => navTo({ view: "home" }), style: "color:var(--muted);cursor:pointer" }, "← all swarms")));
  nav.appendChild(el("h2", {}, `${detail.name}`));

  nav.appendChild(el("h2", {}, "Agents"));
  const agentList = el("ul");
  for (const a of detail.agents) {
    const ps = a.process_status || {};
    const status = ps.tmux_alive && ps.watcher_alive ? "ok"
                 : ps.tmux_alive || ps.watcher_alive ? "partial" : "bad";
    const active = focusAgent === a.name;
    agentList.appendChild(el("li", {}, el("a", {
      className: active ? "active" : "",
      title: a.role,
      "data-agent": a.name,
      onClick: () => navTo({ view: "agent", swarm: detail.name, agent: a.name }),
    }, el("span", { className: "status-dot " + status, "data-status-dot": "1" }),
       a.name,
       el("span", { className: "meta" }, a.runtime))));
  }
  nav.appendChild(agentList);

  nav.appendChild(el("h2", {}, "Channels"));
  const chList = el("ul");
  for (const c of detail.channels) {
    const active = focusChannel === c.file;
    chList.appendChild(el("li", {}, el("a", {
      className: active ? "active" : "",
      onClick: () => navTo({ view: "channel", swarm: detail.name, channel: c.file }),
    }, c.file)));
  }
  nav.appendChild(chList);

  // Content area depends on focus mode.
  if (focusChannel) {
    renderChannel(detail, focusChannel);
  } else if (focusAgent) {
    renderAgent(detail, focusAgent);
  } else {
    renderSwarmOverview(detail);
  }
};

const renderSwarmOverview = (detail) => {
  const content = $("content");
  content.innerHTML = "";
  const titleRow = el("div", { style: "display:flex;align-items:center;gap:.5rem" });
  titleRow.appendChild(el("h2", { style: "margin:0" }, detail.name));
  const refreshBtn = el("button", {
    style: "background:transparent;color:var(--muted);border:1px solid var(--border);padding:.2rem .55rem;font-size:.7rem",
    title: "Refresh agent status + channel list now",
  }, "↻ refresh");
  refreshBtn.addEventListener("click", async () => {
    refreshBtn.disabled = true;
    try {
      const updated = await api(`/api/swarms/${encodeURIComponent(detail.name)}`);
      currentSwarmDetail = updated;
      renderSwarmOverview(updated);
    } catch (e) {
      // swallow; the page will re-attempt on its own timer
    } finally {
      refreshBtn.disabled = false;
    }
  });
  titleRow.appendChild(refreshBtn);
  content.appendChild(titleRow);
  if (detail.description) content.appendChild(el("p", { className: "desc" }, detail.description));

  // v0.6.48: surgical auto-refresh of sidebar status dots only.
  // The previous implementation re-rendered the whole overview
  // every 15s — destroyed scroll position + closed any open
  // add-agent / add-channel form. Now we just re-fetch and patch
  // the agent dots in place. Main pane is never touched by the
  // timer; user controls main-pane refresh via the ↻ button.
  stopSwarmRefresh();
  swarmRefreshTimer = setInterval(async () => {
    try {
      const updated = await api(`/api/swarms/${encodeURIComponent(detail.name)}`);
      currentSwarmDetail = updated;
      const r = parseHash();
      if (r.view !== "swarm" || r.swarm !== detail.name) return;
      patchSidebarAgentDots(updated);
    } catch {}
  }, 15000);

  // Toolbar with swarm-level actions (v2: validate + launch + kill).
  const toolbar = el("div", { className: "toolbar" });
  const validateBtn = el("button", {}, "validate");
  const launchBtn = el("button", {}, "launch");
  const killBtn = el("button", {}, "kill");
  const output = el("div", { style: "display:none" });
  const runExec = async (url, label, btnGroup) => {
    btnGroup.forEach((b) => (b.disabled = true));
    output.style.display = "block";
    output.className = "exec-output";
    output.textContent = `running ${label}…`;
    try {
      const r = await fetch(url, { method: "POST" });
      const j = await r.json();
      output.className = "exec-output " + (j.ok ? "ok" : "err");
      output.textContent = "";
      if (j.stdout) {
        output.appendChild(el("div", { className: "label" }, "stdout"));
        output.appendChild(document.createTextNode(j.stdout));
      }
      if (j.stderr) {
        output.appendChild(el("div", { className: "label" }, "stderr"));
        output.appendChild(document.createTextNode(j.stderr));
      }
      output.appendChild(el("div", { className: "label" }, "exit code: " + j.exit_code));
    } catch (e) {
      output.className = "exec-output err";
      output.textContent = e.message;
    } finally {
      btnGroup.forEach((b) => (b.disabled = false));
    }
  };
  const allBtns = [validateBtn, launchBtn, killBtn];
  validateBtn.addEventListener("click", () =>
    runExec(`/api/swarms/${encodeURIComponent(detail.name)}/validate`, "giga validate", allBtns)
  );
  launchBtn.addEventListener("click", () => {
    const n = detail.agents.length;
    const useStagger = n >= 10;
    const staggerVal = useStagger ? prompt(`Stagger between agent spawns (seconds)? Empty = ${useStagger ? "10" : "0"}.`, useStagger ? "10" : "0") : "0";
    if (staggerVal === null) return; // canceled
    const stagger = Math.max(0, parseInt(staggerVal, 10) || 0);
    if (!confirm(`Launch ${detail.name} (${n} agents${stagger ? `, ${stagger}s stagger` : ""})? This spawns tmux/wt panes.`)) return;
    runExec(
      `/api/swarms/${encodeURIComponent(detail.name)}/launch?stagger=${stagger}`,
      `giga launch (--skip-init${stagger ? `, --stagger ${stagger}` : ""})`,
      allBtns
    );
  });
  killBtn.addEventListener("click", () => {
    if (!confirm(`Kill tmux session giga-${detail.name}? This terminates EVERY agent pane in this swarm. Channel files + workdirs are untouched.`)) return;
    runExec(`/api/swarms/${encodeURIComponent(detail.name)}/kill`, "tmux kill-session", allBtns);
  });
  toolbar.appendChild(validateBtn);
  toolbar.appendChild(launchBtn);
  toolbar.appendChild(killBtn);

  const addAgentBtn = el("button", {}, "+ add agent");
  toolbar.appendChild(addAgentBtn);
  content.appendChild(toolbar);
  content.appendChild(output);

  // Inline add-agent form, hidden by default.
  const formPanel = el("div", { className: "form-panel", style: "display:none" });
  renderAddAgentForm(formPanel, detail, allBtns, output);
  content.appendChild(formPanel);
  addAgentBtn.addEventListener("click", () => {
    formPanel.style.display = formPanel.style.display === "none" ? "" : "none";
  });

  // "+ add channel" button — placed in the toolbar with everything
  // else, since the channels list itself lives in the sidebar.
  const addChannelBtn = el("button", {}, "+ add channel");
  toolbar.appendChild(addChannelBtn);
  const addChannelPanel = el("div", { className: "form-panel", style: "display:none" });
  renderAddChannelForm(addChannelPanel, detail, allBtns, output);
  content.appendChild(addChannelPanel);
  addChannelBtn.addEventListener("click", () => {
    addChannelPanel.style.display = addChannelPanel.style.display === "none" ? "" : "none";
  });

  // Unified timeline: most recent posts across every channel in
  // the swarm (broadcast and bilateral both). Replaces the old
  // agent grid + channel rows that were duplicates of the sidebar.
  const timelineHeading = el("h2", { style: "margin-top:1rem" }, "Recent activity");
  content.appendChild(timelineHeading);
  const timelineList = el("div", { className: "posts", id: "swarm-timeline" });
  content.appendChild(timelineList);
  loadTimeline(detail, timelineList);
};

const loadTimeline = async (detail, listEl) => {
  listEl.innerHTML = "<div class='empty'>Loading timeline…</div>";
  try {
    const t = await api(`/api/swarms/${encodeURIComponent(detail.name)}/timeline?n=100`);
    listEl.innerHTML = "";
    if (!t.posts.length) {
      listEl.appendChild(el("div", { className: "empty" }, "No posts yet."));
      return;
    }
    for (const p of t.posts) {
      const card = el("div", {
        className: "post",
        style: "cursor:pointer",
      },
        el("div", { className: "post-head" },
          el("span", { className: "sender" }, "[" + p.sender + "]"),
          el("span", { style: "color:var(--muted);font-size:.75rem" }, p.channel),
          el("span", { className: "subject" }, p.subject),
          el("span", { className: "ts" }, fmtRel(p.timestamp_iso)),
        ),
        el("div", { className: "post-body" }, truncate(p.body || "(empty body)", 600)),
      );
      card.addEventListener("click", () => navTo({ view: "channel", swarm: detail.name, channel: p.channel }));
      listEl.appendChild(card);
    }
  } catch (e) {
    listEl.innerHTML = "";
    listEl.appendChild(el("div", { className: "error" }, "Timeline load failed: " + e.message));
  }
};

const truncate = (s, n) => {
  if (s.length <= n) return s;
  return s.slice(0, n) + "\n…(truncated)";
};

// v0.6.48: in-place sidebar status-dot updater. Walks the
// freshly-fetched swarm detail and updates each agent's
// status-dot className without re-rendering anything. Cheap +
// non-destructive — won't interrupt the user scrolling the
// timeline, typing into a form, or anything else.
const patchSidebarAgentDots = (updated) => {
  for (const a of updated.agents) {
    const ps = a.process_status || {};
    const status = ps.tmux_alive && ps.watcher_alive ? "ok"
                 : ps.tmux_alive || ps.watcher_alive ? "partial" : "bad";
    const link = document.querySelector(`#nav a[data-agent="${CSS.escape(a.name)}"]`);
    if (!link) continue;
    const dot = link.querySelector('[data-status-dot]');
    if (!dot) continue;
    const desired = "status-dot " + status;
    if (dot.className !== desired) dot.className = desired;
  }
};

// v0.6.47: agent detail view. Same outer chrome as the other
// swarm sub-views; main pane shows metadata + the live tmux
// pane log.
const renderAgent = (detail, slug) => {
  stopSwarmRefresh();
  const a = detail.agents.find((x) => x.name === slug);
  const content = $("content");
  content.innerHTML = "";
  if (!a) {
    content.appendChild(el("h2", {}, slug));
    content.appendChild(el("div", { className: "error" }, "Agent not found in this swarm's config."));
    return;
  }
  const ps = a.process_status || {};
  const status = ps.tmux_alive && ps.watcher_alive ? "ok"
               : ps.tmux_alive || ps.watcher_alive ? "partial" : "bad";

  const title = el("div", { style: "display:flex;align-items:center;gap:.5rem" });
  title.appendChild(el("span", { className: "status-dot " + status, style: "width:.85rem;height:.85rem" }));
  title.appendChild(el("h2", { style: "margin:0" }, a.name));
  title.appendChild(el("span", { className: "meta", style: "color:var(--muted);font-size:.9rem" },
    a.runtime, " · ", a.platform,
    a.host ? ` · host=${a.host}` : "",
    a.bench_scheduler ? " · bench" : "",
    a.swarm_boss ? " · boss" : ""
  ));
  content.appendChild(title);
  content.appendChild(el("p", { className: "desc" }, a.role));

  const meta = el("div", { style: "margin:.5rem 0;font-size:.85rem;color:var(--muted)" });
  meta.appendChild(el("div", {}, "workdir: ", el("code", {}, a.workdir)));
  if (a.code_root) meta.appendChild(el("div", {}, "code root: ", el("code", {}, a.code_root)));
  meta.appendChild(el("div", {},
    "tmux: ", ps.tmux_alive ? "alive" : "not running",
    " · watcher: ", ps.watcher_alive ? "alive" : "not running",
  ));
  content.appendChild(meta);

  content.appendChild(el("h2", {}, "Live pane log"));
  const logBox = el("pre", {
    style: "background:var(--bg);color:var(--text);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:4px;padding:.5rem;font-family:ui-monospace,'Menlo',monospace;font-size:.78rem;max-height:32rem;overflow:auto;white-space:pre-wrap;margin:0",
  }, "loading…");
  content.appendChild(logBox);
  let frozen = false;
  const fetchLog = async () => {
    if (frozen) return;
    try {
      const r = await fetch(`/api/swarms/${encodeURIComponent(detail.name)}/agents/${encodeURIComponent(a.name)}/log?lines=400`);
      const j = await r.json();
      const nearBottom = logBox.scrollTop + logBox.clientHeight + 50 >= logBox.scrollHeight;
      logBox.textContent = j.captured ? (j.content || "(empty pane)") : "(no matching tmux window — agent isn't running or named differently)";
      if (nearBottom) logBox.scrollTop = logBox.scrollHeight;
    } catch (e) {
      logBox.textContent = "log fetch error: " + e.message;
    }
  };
  logBox.addEventListener("mouseenter", () => { frozen = true; });
  logBox.addEventListener("mouseleave", () => { frozen = false; });
  fetchLog();
  swarmRefreshTimer = setInterval(fetchLog, 2000); // reuse the timer slot
};

const renderAddChannelForm = (panel, detail, allBtns, output) => {
  panel.innerHTML = "";
  const aSel = el("select");
  const bSel = el("select");
  for (const a of detail.agents) {
    aSel.appendChild(el("option", { value: a.name }, a.name));
    bSel.appendChild(el("option", { value: a.name }, a.name));
  }
  if (detail.agents.length >= 2) bSel.selectedIndex = 1;
  const fileI = el("input", { type: "text", placeholder: "(auto: <a>-<b>.md, sorted)" });
  const dryCk = el("input", { type: "checkbox" });
  dryCk.checked = true;
  const submitBtn = el("button", {}, "add");
  const cancelBtn = el("button", { style: "background:transparent;color:var(--muted);border:1px solid var(--border)" }, "cancel");
  const handle = async () => {
    if (aSel.value === bSel.value) {
      output.style.display = "block";
      output.className = "exec-output err";
      output.textContent = "participants must differ";
      return;
    }
    const body = {
      participants: [aSel.value, bSel.value],
      file: fileI.value.trim() || null,
      dry_run: dryCk.checked,
    };
    allBtns.forEach((b) => (b.disabled = true));
    submitBtn.disabled = true;
    output.style.display = "block";
    output.className = "exec-output";
    output.textContent = `running giga add-channel${dryCk.checked ? " --dry-run" : ""}…`;
    try {
      const r = await fetch(`/api/swarms/${encodeURIComponent(detail.name)}/channels`, {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify(body),
      });
      const j = await r.json();
      if (!r.ok) {
        output.className = "exec-output err";
        output.textContent = j.error || `${r.status} ${r.statusText}`;
        return;
      }
      output.className = "exec-output " + (j.ok ? "ok" : "err");
      output.textContent = "";
      if (j.stdout) { output.appendChild(el("div", { className: "label" }, "stdout")); output.appendChild(document.createTextNode(j.stdout)); }
      if (j.stderr) { output.appendChild(el("div", { className: "label" }, "stderr")); output.appendChild(document.createTextNode(j.stderr)); }
      output.appendChild(el("div", { className: "label" }, "exit code: " + j.exit_code));
    } catch (e) {
      output.className = "exec-output err";
      output.textContent = e.message;
    } finally {
      allBtns.forEach((b) => (b.disabled = false));
      submitBtn.disabled = false;
    }
  };
  submitBtn.addEventListener("click", handle);
  cancelBtn.addEventListener("click", () => { panel.style.display = "none"; });
  panel.appendChild(el("div", { className: "row" }, el("label", {}, "from"), aSel));
  panel.appendChild(el("div", { className: "row" }, el("label", {}, "to"), bSel));
  panel.appendChild(el("div", { className: "row" }, el("label", {}, "filename"), fileI));
  panel.appendChild(el("div", { className: "hint" }, "Bilateral channels only. Filename auto-derived as sorted-alphabetical <a>-<b>.md unless you override."));
  const checkboxRow = el("div", { className: "checkbox-row" });
  const dryLabel = el("label", {}, dryCk, " dry-run (preview only)");
  checkboxRow.appendChild(dryLabel);
  panel.appendChild(el("div", { className: "row" }, el("span"), checkboxRow));
  panel.appendChild(el("div", { className: "actions" }, submitBtn, cancelBtn));
};

const renderChannel = async (detail, file) => {
  stopSwarmRefresh();
  const content = $("content");
  content.innerHTML = "";
  content.appendChild(el("h2", {}, file));
  const ch = detail.channels.find((c) => c.file === file);
  if (ch) content.appendChild(el("p", { className: "desc" }, ch.participants.join(" ↔ ") + (ch.purpose ? " — " + ch.purpose : "")));
  const stateBadge = el("span", { className: "ws-state connecting" }, "connecting…");
  content.appendChild(stateBadge);
  const posts = el("div", { className: "posts" });
  content.appendChild(posts);
  if (ch) content.appendChild(renderComposer(detail.name, ch));

  closeWs();
  const wsUrl = location.origin.replace(/^http/, "ws") +
    `/ws/channels/${encodeURIComponent(detail.name)}/${encodeURIComponent(file)}`;
  const ws = new WebSocket(wsUrl);
  activeWs = ws;

  ws.onopen = () => {
    stateBadge.className = "ws-state live";
    stateBadge.textContent = "live";
  };
  ws.onclose = () => {
    stateBadge.className = "ws-state disconnected";
    stateBadge.textContent = "disconnected";
  };
  ws.onerror = () => {
    stateBadge.className = "ws-state disconnected";
    stateBadge.textContent = "error";
  };
  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }
    if (msg.type === "snapshot") {
      posts.innerHTML = "";
      for (const p of msg.posts) posts.appendChild(renderPost(p));
      posts.scrollTop = posts.scrollHeight;
    } else if (msg.type === "append") {
      const wasAtBottom = posts.scrollTop + posts.clientHeight + 50 >= posts.scrollHeight;
      posts.appendChild(renderPost(msg.post));
      if (wasAtBottom) posts.scrollTop = posts.scrollHeight;
    } else if (msg.type === "error") {
      stateBadge.className = "ws-state disconnected";
      stateBadge.textContent = "error: " + msg.message;
    }
  };
};

const renderPost = (p) => {
  return el("div", { className: "post" },
    el("div", { className: "post-head" },
      el("span", { className: "sender" }, "[" + p.sender + "]"),
      el("span", { className: "subject" }, p.subject),
      el("span", { className: "ts" }, fmtRel(p.timestamp_iso))
    ),
    el("div", { className: "post-body" }, p.body || "(empty body)")
  );
};

// v0.6.40: per-channel post composer. Sender dropdown is the
// channel's participants (server-side validates anyway, so this
// is a guard against typos). Subject + body free-text. Waiting-on
// dropdown is participants except the sender.
const renderComposer = (swarmName, channel) => {
  const wrap = el("div", { className: "composer" });
  const senderSel = el("select", { name: "as" });
  for (const p of channel.participants) senderSel.appendChild(el("option", { value: p }, p));
  const subjInput = el("input", { type: "text", name: "subject", placeholder: "subject line" });
  const bodyTa = el("textarea", { name: "body", placeholder: "body (markdown ok)" });
  const waitingSel = el("select", { name: "waiting_on" });
  waitingSel.appendChild(el("option", { value: "" }, "(none — informational)"));
  for (const p of channel.participants) waitingSel.appendChild(el("option", { value: p }, p));
  const feedback = el("span", { className: "feedback" }, "");
  const submit = el("button", {}, "post");

  const updateWaitingOptions = () => {
    const me = senderSel.value;
    for (const opt of waitingSel.options) {
      opt.disabled = opt.value === me && opt.value !== "";
    }
    if (waitingSel.value === me && me !== "") waitingSel.value = "";
  };
  senderSel.addEventListener("change", updateWaitingOptions);
  updateWaitingOptions();

  submit.addEventListener("click", async () => {
    const subject = subjInput.value.trim();
    if (!subject) { feedback.className = "feedback err"; feedback.textContent = "subject required"; return; }
    submit.disabled = true;
    feedback.className = "feedback"; feedback.textContent = "posting…";
    try {
      const r = await fetch(`/api/swarms/${encodeURIComponent(swarmName)}/channels/${encodeURIComponent(channel.file)}`, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({
          as: senderSel.value,
          subject: subject,
          body: bodyTa.value || null,
          waiting_on: waitingSel.value || null,
        }),
      });
      if (!r.ok) {
        const ej = await r.json().catch(() => ({}));
        throw new Error(ej.error || `${r.status} ${r.statusText}`);
      }
      feedback.className = "feedback ok"; feedback.textContent = "posted";
      subjInput.value = ""; bodyTa.value = "";
      setTimeout(() => { feedback.textContent = ""; }, 3000);
    } catch (e) {
      feedback.className = "feedback err"; feedback.textContent = e.message;
    } finally {
      submit.disabled = false;
    }
  });

  wrap.appendChild(el("div", { className: "row" }, el("label", {}, "from"), senderSel));
  wrap.appendChild(el("div", { className: "row" }, el("label", {}, "subject"), subjInput));
  wrap.appendChild(el("div", { className: "row" }, el("label", {}, "body"), bodyTa));
  wrap.appendChild(el("div", { className: "row" }, el("label", {}, "waiting on"), waitingSel));
  wrap.appendChild(el("div", { className: "actions" }, submit, feedback));
  return wrap;
};

// v0.6.43 v2: add-agent inline form. Posts to
// /api/swarms/:name/agents which shells out to `giga add-agent`.
// Field set matches the most-used CLI flags; advanced bits
// (--template, --no-broadcast as default off) deferred.
const renderAddAgentForm = (panel, detail, allBtns, output) => {
  panel.innerHTML = "";
  const nameI = el("input", { type: "text", placeholder: "alice" });
  const roleI = el("input", { type: "text", placeholder: "Short role description" });
  const workdirI = el("input", { type: "text" });
  // Default workdir based on swarm config path.
  const configDir = detail.config_path.replace(/\/giga-harness\.toml$/, "");
  workdirI.value = `${configDir}/workdirs/<name>`;
  nameI.addEventListener("input", () => {
    workdirI.value = `${configDir}/workdirs/${nameI.value || "<name>"}`;
  });
  const platformS = el("select");
  for (const p of ["wsl", "windows"]) platformS.appendChild(el("option", { value: p }, p));
  // v0.6.54: host is now mandatory. Dropdown is populated from
  // the swarm's [[hosts]] section (not inferred from agents — that
  // would miss a freshly-added host with no agents). Default
  // selection is this_host so the common case is one click. No
  // "(none)" option — the design earlier let agents slide in
  // unpinned, which broke multi-host expectations.
  const hostS = el("select", { required: true });
  const knownHosts = detail.hosts && detail.hosts.length ? detail.hosts : (
    // Legacy fallback for pre-[[hosts]] configs: derive from existing agents.
    Array.from(new Set(detail.agents.map((a) => a.host).filter(Boolean)))
  );
  if (knownHosts.length === 0) {
    hostS.appendChild(el("option", { value: "" }, "(no [[hosts]] defined — add one in the TOML first)"));
    hostS.disabled = true;
  } else {
    for (const h of knownHosts) hostS.appendChild(el("option", { value: h }, h));
    if (detail.this_host && knownHosts.includes(detail.this_host)) {
      hostS.value = detail.this_host;
    }
  }
  const codeRootI = el("input", { type: "text", placeholder: "(optional, e.g. /home/me/projects/foo)" });
  const peersSel = el("select", { multiple: true, size: 6, style: "min-height:6.5rem" });
  for (const a of detail.agents) peersSel.appendChild(el("option", { value: a.name }, a.name));
  const benchCk = el("input", { type: "checkbox" });
  const bossCk = el("input", { type: "checkbox" });
  const dryCk = el("input", { type: "checkbox" });
  dryCk.checked = true; // safer default — preview first
  const submitBtn = el("button", {}, "add");
  const cancelBtn = el("button", { style: "background:transparent;color:var(--muted);border:1px solid var(--border)" }, "cancel");

  const handle = async () => {
    const name = nameI.value.trim();
    const role = roleI.value.trim();
    const workdir = workdirI.value.trim();
    if (!name || !role || !workdir) {
      output.style.display = "block";
      output.className = "exec-output err";
      output.textContent = "name, role, and workdir are required";
      return;
    }
    if (!hostS.value) {
      output.style.display = "block";
      output.className = "exec-output err";
      output.textContent = "host is required — every agent must be pinned to a host. Add a [[hosts]] entry to the TOML if none exist yet.";
      return;
    }
    const peers = Array.from(peersSel.selectedOptions).map((o) => o.value);
    const body = {
      name, role, workdir,
      platform: platformS.value,
      host: hostS.value,
      peers,
      bench_scheduler: benchCk.checked,
      swarm_boss: bossCk.checked,
      code_root: codeRootI.value.trim() || null,
      dry_run: dryCk.checked,
    };
    allBtns.forEach((b) => (b.disabled = true));
    submitBtn.disabled = true;
    output.style.display = "block";
    output.className = "exec-output";
    output.textContent = `running giga add-agent${dryCk.checked ? " --dry-run" : ""}…`;
    try {
      const r = await fetch(`/api/swarms/${encodeURIComponent(detail.name)}/agents`, {
        method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify(body),
      });
      const j = await r.json();
      if (!r.ok) {
        output.className = "exec-output err";
        output.textContent = j.error || `${r.status} ${r.statusText}`;
        return;
      }
      output.className = "exec-output " + (j.ok ? "ok" : "err");
      output.textContent = "";
      if (j.stdout) { output.appendChild(el("div", { className: "label" }, "stdout")); output.appendChild(document.createTextNode(j.stdout)); }
      if (j.stderr) { output.appendChild(el("div", { className: "label" }, "stderr")); output.appendChild(document.createTextNode(j.stderr)); }
      output.appendChild(el("div", { className: "label" }, "exit code: " + j.exit_code));
    } catch (e) {
      output.className = "exec-output err";
      output.textContent = e.message;
    } finally {
      allBtns.forEach((b) => (b.disabled = false));
      submitBtn.disabled = false;
    }
  };
  submitBtn.addEventListener("click", handle);
  cancelBtn.addEventListener("click", () => { panel.style.display = "none"; });

  panel.appendChild(el("div", { className: "row" }, el("label", {}, "name"), nameI));
  panel.appendChild(el("div", { className: "row" }, el("label", {}, "role"), roleI));
  panel.appendChild(el("div", { className: "row" }, el("label", {}, "workdir"), workdirI));
  panel.appendChild(el("div", { className: "row" }, el("label", {}, "platform"), platformS));
  panel.appendChild(el("div", { className: "row" }, el("label", {}, "host"), hostS));
  panel.appendChild(el("div", { className: "row" }, el("label", {}, "code root"), codeRootI));
  panel.appendChild(el("div", { className: "row" }, el("label", {}, "peers"), peersSel));
  const checkboxRow = el("div", { className: "checkbox-row" });
  const addCheck = (cb, txt) => {
    const wrap = el("label", {});
    wrap.appendChild(cb);
    wrap.appendChild(document.createTextNode(" " + txt));
    checkboxRow.appendChild(wrap);
  };
  addCheck(benchCk, "bench scheduler");
  addCheck(bossCk, "swarm boss");
  addCheck(dryCk, "dry-run (preview only)");
  panel.appendChild(el("div", { className: "row" }, el("span"), checkboxRow));
  panel.appendChild(el("div", { className: "actions" }, submitBtn, cancelBtn));
};

const updateProcSummary = async () => {

    const snap = await api("/api/processes");
    const sessions = snap.tmux.length;

    $("proc-summary").textContent = `${sessions} tmux session(s) · ${watchers} watcher(s)`;

const route = () => {
  const r = parseHash();
  if (r.view === "home") renderHome();
  else if (r.view === "swarm") renderSwarm(r.swarm, null, null);
  else if (r.view === "channel") renderSwarm(r.swarm, r.channel, null);
  else if (r.view === "agent") renderSwarm(r.swarm, null, r.agent);
};

window.addEventListener("hashchange", route);
window.addEventListener("DOMContentLoaded", () => {
  route();
  updateProcSummary();
  setInterval(updateProcSummary, 15000);
});
</script>
</body>
</html>
